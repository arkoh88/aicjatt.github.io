<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: rgba(255,255,255,0.08);
      --text: #f1f5f9;
      --muted: #64748b;
      --accent: #a78bfa;
      --accent2: #60a5fa;
      --user-bg: linear-gradient(135deg, #7c3aed, #4f46e5);
      --ai-bg: rgba(255,255,255,0.04);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
      gap: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      box-shadow: 0 0 16px rgba(167,139,250,0.4);
    }

    .logo-text {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      font-weight: 700;
    }

    .logo-text span { color: var(--accent); }

    /* Model selector */
    .model-wrap { position: relative; }

    #model-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 12px;
      color: var(--text);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      touch-action: manipulation;
    }

    #model-btn:active { opacity: 0.7; }

    .tag {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .arrow { font-size: 9px; color: var(--accent); }

    #model-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      z-index: 200;
      min-width: 220px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      display: none;
    }

    #model-dropdown.open { display: block; }

    .model-opt {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 2px solid transparent;
      transition: background 0.15s;
      touch-action: manipulation;
    }

    .model-opt:active, .model-opt:hover { background: rgba(255,255,255,0.06); }
    .model-opt.active {
      background: rgba(167,139,250,0.12);
      border-left-color: var(--accent);
    }

    .model-opt span.name { font-size: 13.5px; color: #cbd5e1; }
    .model-opt.active span.name { color: #e2d9ff; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 14px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.25); border-radius: 2px; }

    /* Empty state */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60%;
      gap: 12px;
      opacity: 0.45;
      animation: pulse 3s ease-in-out infinite;
    }

    #empty .big { font-size: 44px; }
    #empty .title { font-family: 'Space Mono', monospace; font-size: 15px; }
    #empty .sub { font-size: 13px; color: #94a3b8; text-align: center; }

    .msg-row {
      display: flex;
      margin-bottom: 16px;
      animation: fadeSlide 0.28s ease;
    }

    .msg-row.user { justify-content: flex-end; }
    .msg-row.ai   { justify-content: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .ai .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      margin-right: 9px;
      box-shadow: 0 0 10px rgba(167,139,250,0.35);
    }

    .user .avatar {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      margin-left: 9px;
    }

    .bubble {
      max-width: 76%;
      padding: 11px 15px;
      font-size: 14.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user .bubble {
      background: var(--user-bg);
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.3);
    }

    .ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: 4px 18px 18px 18px;
    }

    /* Typing dots */
    .dots { display: inline-flex; gap: 4px; align-items: center; padding: 2px 0; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    /* Error */
    .error-bar {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      color: #fca5a5;
      font-size: 13px;
      margin-bottom: 10px;
      animation: fadeSlide 0.3s ease;
    }

    /* ── Input area ── */
    footer {
      padding: 10px 14px 16px;
      border-top: 1px solid var(--border);
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .clear-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 6px;
    }

    #clear-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 7px;
      padding: 4px 12px;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      touch-action: manipulation;
    }

    #clear-btn:active { opacity: 0.6; }

    .input-box {
      display: flex;
      gap: 9px;
      align-items: flex-end;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 10px 12px;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      max-height: 150px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #user-input::placeholder { color: rgba(241,245,249,0.28); }

    #send-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(167,139,250,0.2);
      border: 1px solid rgba(167,139,250,0.35);
      color: var(--accent);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #send-btn:not(:disabled):active {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      transform: scale(0.95);
    }

    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .footer-hint {
      text-align: center;
      margin-top: 7px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
    }

    /* ── Animations ── */
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }
    @keyframes pulse {
      0%,100% { opacity: 0.35; }
      50%      { opacity: 0.55; }
    }

    /* ── Mobile tweaks ── */
    @media (max-width: 480px) {
      header { padding: 10px 12px; }
      #messages { padding: 14px 10px; }
      .bubble { max-width: 85%; font-size: 14px; }
      footer { padding: 8px 10px 14px; }
      .logo-text { font-size: 14px; }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">ai<span>chat</span></span>
    </div>

    <div class="model-wrap">
      <button id="model-btn" aria-haspopup="listbox" aria-expanded="false">
        <span class="tag" id="model-tag" style="background:#4ecdc4;">Баланс</span>
        <span id="model-name">Claude Sonnet 4.5</span>
        <span class="arrow">▼</span>
      </button>

      <div id="model-dropdown" role="listbox">
        <!-- filled by JS -->
      </div>
    </div>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div id="empty">
      <div class="big">✦</div>
      <div class="title">Начните разговор</div>
      <div class="sub">Выберите модель и напишите сообщение</div>
    </div>
  </div>

  <!-- Input -->
  <footer>
    <div class="clear-row" id="clear-row" style="display:none;">
      <button id="clear-btn">очистить чат</button>
    </div>
    <div class="input-box">
      <textarea id="user-input" rows="1"
        placeholder="Напишите сообщение…"></textarea>
      <button id="send-btn" disabled aria-label="Отправить">↑</button>
    </div>
    <div class="footer-hint" id="footer-hint">cc.freemodel.dev</div>
  </footer>
</div>

<script>
const API_BASE = "https://cc.freemodel.dev";
const API_KEY  = "fe_oa_312a9477cf6129fb9b293af692a8553e2da12836623345ce";

const MODELS = [
  { id: "claude-opus-4-5",           label: "Claude Opus 4.5",    tag: "Мощный",  color: "#ff6b35" },
  { id: "claude-sonnet-4-5",         label: "Claude Sonnet 4.5",  tag: "Баланс",  color: "#4ecdc4" },
  { id: "claude-haiku-4-5",          label: "Claude Haiku 4.5",   tag: "Быстрый", color: "#45b7d1" },
  { id: "claude-sonnet-4-20250514",  label: "Claude Sonnet 4",    tag: "Новый",   color: "#a78bfa" },
  { id: "gpt-4o",                    label: "GPT-4o",              tag: "OpenAI",  color: "#10a37f" },
  { id: "gpt-4o-mini",               label: "GPT-4o Mini",         tag: "Эконом",  color: "#6ee7b7" },
  { id: "gemini-2.0-flash",          label: "Gemini 2.0 Flash",   tag: "Google",  color: "#4285f4" },
  { id: "gemini-1.5-pro",            label: "Gemini 1.5 Pro",     tag: "Google",  color: "#4285f4" },
];

/* ── State ── */
let currentModel = MODELS[1];
let history = [];   // [{role, content}, ...]
let loading = false;

/* ── DOM refs ── */
const modelBtn      = document.getElementById("model-btn");
const modelTag      = document.getElementById("model-tag");
const modelName     = document.getElementById("model-name");
const dropdown      = document.getElementById("model-dropdown");
const messagesEl    = document.getElementById("messages");
const emptyEl       = document.getElementById("empty");
const userInput     = document.getElementById("user-input");
const sendBtn       = document.getElementById("send-btn");
const clearRow      = document.getElementById("clear-row");
const clearBtn      = document.getElementById("clear-btn");
const footerHint    = document.getElementById("footer-hint");

/* ── Build dropdown ── */
function buildDropdown() {
  dropdown.innerHTML = "";
  MODELS.forEach(m => {
    const div = document.createElement("div");
    div.className = "model-opt" + (m.id === currentModel.id ? " active" : "");
    div.setAttribute("role", "option");
    div.innerHTML = `
      <span class="tag" style="background:${m.color};min-width:44px;text-align:center;">${m.tag}</span>
      <span class="name">${m.label}</span>`;
    div.addEventListener("click", () => selectModel(m));
    dropdown.appendChild(div);
  });
}

function selectModel(m) {
  currentModel = m;
  modelTag.textContent = m.tag;
  modelTag.style.background = m.color;
  modelName.textContent = m.label;
  footerHint.textContent = m.label + " · cc.freemodel.dev";
  closeDropdown();
  buildDropdown();
}

function toggleDropdown() {
  const open = dropdown.classList.toggle("open");
  modelBtn.setAttribute("aria-expanded", open);
}

function closeDropdown() {
  dropdown.classList.remove("open");
  modelBtn.setAttribute("aria-expanded", false);
}

modelBtn.addEventListener("click", e => { e.stopPropagation(); toggleDropdown(); });
document.addEventListener("click", closeDropdown);
dropdown.addEventListener("click", e => e.stopPropagation());

buildDropdown();
selectModel(currentModel);

/* ── Messages ── */
function scrollBottom() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: "smooth" });
}

function addMessage(role, content) {
  emptyEl.style.display = "none";

  const row = document.createElement("div");
  row.className = "msg-row " + (role === "user" ? "user" : "ai");

  if (role === "user") {
    row.innerHTML = `
      <div class="bubble">${escapeHtml(content)}</div>
      <div class="avatar">👤</div>`;
  } else {
    row.innerHTML = `
      <div class="avatar">✦</div>
      <div class="bubble" id="bubble-${Date.now()}">${
        content === "__typing__"
          ? '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>'
          : escapeHtml(content)
      }</div>`;
  }

  messagesEl.appendChild(row);
  scrollBottom();
  clearRow.style.display = "flex";
  return row;
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function showError(msg) {
  const div = document.createElement("div");
  div.className = "error-bar";
  div.textContent = "⚠ " + msg;
  messagesEl.appendChild(div);
  scrollBottom();
}

/* ── Send ── */
async function send() {
  const text = userInput.value.trim();
  if (!text || loading) return;

  loading = true;
  sendBtn.disabled = true;
  sendBtn.textContent = "⟳";
  userInput.value = "";
  autoResize();

  history.push({ role: "user", content: text });
  addMessage("user", text);

  const typingRow = addMessage("assistant", "__typing__");

  try {
    const res = await fetch(`${API_BASE}/v1/messages`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY,
        "anthropic-version": "2023-06-01",
      },
      body: JSON.stringify({
        model: currentModel.id,
        max_tokens: 2048,
        messages: history,
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const reply = data.content?.[0]?.text || "(нет ответа)";

    history.push({ role: "assistant", content: reply });

    // Replace typing bubble with real text
    const bubble = typingRow.querySelector(".bubble");
    bubble.textContent = reply;

  } catch (e) {
    typingRow.remove();
    history.pop(); // remove user msg from history if failed
    showError(e.message || "Ошибка запроса");
  } finally {
    loading = false;
    sendBtn.disabled = false;
    sendBtn.textContent = "↑";
    updateSendBtn();
  }
}

/* ── Input handling ── */
function autoResize() {
  userInput.style.height = "auto";
  userInput.style.height = Math.min(userInput.scrollHeight, 150) + "px";
}

function updateSendBtn() {
  sendBtn.disabled = !userInput.value.trim() || loading;
}

userInput.addEventListener("input", () => { autoResize(); updateSendBtn(); });

userInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener("click", send);

/* ── Clear ── */
clearBtn.addEventListener("click", () => {
  history = [];
  messagesEl.innerHTML = "";
  messagesEl.appendChild(emptyEl);
  emptyEl.style.display = "flex";
  clearRow.style.display = "none";
});

/* ── iOS viewport fix (keyboard pushes content up) ── */
if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
  window.addEventListener("resize", () => {
    document.documentElement.style.height = window.innerHeight + "px";
  });
}
</script>
</body>
</html>
